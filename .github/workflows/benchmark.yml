name: Benchmark

on:
  workflow_dispatch:
    inputs:
      corpus:
        description: Corpus to benchmark
        required: false
        default: wordpress
        type: string
      category:
        description: Optional benchmark category filter
        required: false
        default: ""
        type: string
      repeat:
        description: Number of measured runs
        required: false
        default: "5"
        type: string
      warmup:
        description: Number of warmup runs
        required: false
        default: "1"
        type: string
      compare_ref:
        description: Git ref to compare against
        required: false
        default: main
        type: string
  pull_request:
    paths:
      - "src/**"
      - "benchmarks/**"
      - "bin/**"
      - "composer.json"
      - "composer.lock"
      - ".github/workflows/benchmark.yml"

concurrency:
  group: benchmark-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HEAD_OUTPUT: build/benchmarks/head-series.json
      BASE_OUTPUT: build/benchmarks/base-series.json
      COMPARE_OUTPUT: build/benchmarks/comparison.md
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep

      - name: Install ast-grep
        run: npm install --global @ast-grep/cli

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Resolve benchmark settings
        id: settings
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "compare_ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "repeat=3" >> "$GITHUB_OUTPUT"
            echo "warmup=1" >> "$GITHUB_OUTPUT"
            echo "corpus=wordpress" >> "$GITHUB_OUTPUT"
            echo "category=" >> "$GITHUB_OUTPUT"
          else
            compare_ref="${{ inputs.compare_ref }}"
            if [[ -z "$compare_ref" ]]; then
              compare_ref="main"
            fi
            if [[ "$compare_ref" == "main" ]]; then
              compare_ref="origin/main"
            fi
            echo "compare_ref=$compare_ref" >> "$GITHUB_OUTPUT"
            echo "repeat=${{ inputs.repeat }}" >> "$GITHUB_OUTPUT"
            echo "warmup=${{ inputs.warmup }}" >> "$GITHUB_OUTPUT"
            echo "corpus=${{ inputs.corpus }}" >> "$GITHUB_OUTPUT"
            echo "category=${{ inputs.category }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve benchmark paths
        id: paths
        shell: bash
        run: |
          echo "corpus_root=$RUNNER_TEMP/phgrep-corpora" >> "$GITHUB_OUTPUT"
          echo "base_worktree=$RUNNER_TEMP/phgrep-base" >> "$GITHUB_OUTPUT"

      - name: Prepare WordPress corpus
        shell: bash
        run: |
          mkdir -p "${{ steps.paths.outputs.corpus_root }}"
          if [[ ! -d "${{ steps.paths.outputs.corpus_root }}/wordpress/.git" ]]; then
            git clone --depth=1 https://github.com/WordPress/WordPress.git "${{ steps.paths.outputs.corpus_root }}/wordpress"
          else
            git -C "${{ steps.paths.outputs.corpus_root }}/wordpress" fetch --depth=1 origin HEAD
            git -C "${{ steps.paths.outputs.corpus_root }}/wordpress" reset --hard FETCH_HEAD
          fi
          mkdir -p benchmarks/corpora
          ln -sfn "${{ steps.paths.outputs.corpus_root }}/wordpress" benchmarks/corpora/wordpress

      - name: Prepare base worktree
        shell: bash
        run: |
          rm -rf "${{ steps.paths.outputs.base_worktree }}"
          git worktree add --detach "${{ steps.paths.outputs.base_worktree }}" "${{ steps.settings.outputs.compare_ref }}"
          mkdir -p "${{ steps.paths.outputs.base_worktree }}/benchmarks/corpora"
          ln -sfn "${{ steps.paths.outputs.corpus_root }}/wordpress" "${{ steps.paths.outputs.base_worktree }}/benchmarks/corpora/wordpress"
          composer install --working-dir "${{ steps.paths.outputs.base_worktree }}" --no-interaction --no-progress --prefer-dist

      - name: Run head benchmark series
        shell: bash
        run: |
          args=(--corpus "${{ steps.settings.outputs.corpus }}" --repeat "${{ steps.settings.outputs.repeat }}" --warmup "${{ steps.settings.outputs.warmup }}" --compare "rg,grep,sg" --output "$HEAD_OUTPUT")
          if [[ -n "${{ steps.settings.outputs.category }}" ]]; then
            args+=(--category "${{ steps.settings.outputs.category }}")
          fi
          php bin/bench-series "${args[@]}"

      - name: Run base benchmark series
        shell: bash
        run: |
          run_dir="${{ steps.paths.outputs.base_worktree }}/build/benchmarks/base-runs"
          mkdir -p "$run_dir"

          warmup_args=(--corpus "${{ steps.settings.outputs.corpus }}" --compare "rg,grep,sg")
          run_args=(--corpus "${{ steps.settings.outputs.corpus }}" --compare "rg,grep,sg")

          if [[ -n "${{ steps.settings.outputs.category }}" ]]; then
            warmup_args+=(--category "${{ steps.settings.outputs.category }}")
            run_args+=(--category "${{ steps.settings.outputs.category }}")
          fi

          for iteration in $(seq 1 "${{ steps.settings.outputs.warmup }}"); do
            php "${{ steps.paths.outputs.base_worktree }}/bin/bench" "${warmup_args[@]}" >/dev/null
          done

          for iteration in $(seq 1 "${{ steps.settings.outputs.repeat }}"); do
            php "${{ steps.paths.outputs.base_worktree }}/bin/bench" "${run_args[@]}" --output "$run_dir/run-$iteration.json" >/dev/null
          done

          php bin/bench-aggregate --output "${{ steps.paths.outputs.base_worktree }}/$BASE_OUTPUT" "$run_dir"/run-*.json >/dev/null

      - name: Compare benchmark series
        shell: bash
        run: |
          php bin/bench-compare \
            --base-label "${{ steps.settings.outputs.compare_ref }}" \
            --head-label "${GITHUB_SHA}" \
            --output "$COMPARE_OUTPUT" \
            "${{ steps.paths.outputs.base_worktree }}/$BASE_OUTPUT" \
            "$HEAD_OUTPUT"
          cat "$COMPARE_OUTPUT" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.run_id }}
          path: |
            build/benchmarks
            ${{ steps.paths.outputs.base_worktree }}/${{ env.BASE_OUTPUT }}
